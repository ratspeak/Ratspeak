name: Release macOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_github_release:
        description: "Publish macOS artifacts to a GitHub Release"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Release tag to publish when manually dispatching."
        required: false
        type: string
      notarize:
        description: "Sign and notarize with Developer ID credentials"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  RATSPEAK_RSRETICULUM_REF: 73b250f36ee95a27cbddaa6b39c246091fdf7e2b
  RATSPEAK_RSLXMF_REF: 30a62b29906281344a2a1a5d6fd4c99de7f29f83
  RATSPEAK_RSLXST_REF: 7ac244cafde428945838dd709794468d4654fc89

jobs:
  build:
    name: macOS
    runs-on: macos-latest
    steps:
      - name: Checkout Ratspeak
        uses: actions/checkout@v5
        with:
          path: Ratspeak

      - name: Checkout rsReticulum
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/rsReticulum
          ref: ${{ env.RATSPEAK_RSRETICULUM_REF }}
          path: rsReticulum

      - name: Checkout rsLXMF
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/rsLXMF
          ref: ${{ env.RATSPEAK_RSLXMF_REF }}
          path: rsLXMF

      - name: Checkout rsLXST
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/rsLXST
          ref: ${{ env.RATSPEAK_RSLXST_REF }}
          path: rsLXST

      - name: Checkout lrgp-rs
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/lrgp-rs
          path: lrgp-rs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          workspaces: |
            Ratspeak
            Ratspeak/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Run tests
        working-directory: Ratspeak
        run: cargo test --workspace

      - name: Build CSS
        shell: bash
        working-directory: Ratspeak
        run: bash dashboard/build-css.sh

      - name: Check Tauri desktop shell
        shell: bash
        working-directory: Ratspeak
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Import Developer ID certificate
        if: ${{ vars.MACOS_NOTARIZE == 'true' || (github.event_name == 'workflow_dispatch' && inputs.notarize == true) }}
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required macOS signing secret: $name" >&2
              exit 1
            fi
          done

          certificate_path="$RUNNER_TEMP/developer_id_application.p12"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          keychain_password="$(uuidgen)"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Build macOS DMGs
        shell: bash
        working-directory: Ratspeak/src-tauri
        env:
          MACOS_NOTARIZE: ${{ vars.MACOS_NOTARIZE == 'true' || (github.event_name == 'workflow_dispatch' && inputs.notarize == true) }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}
          # Tauri checks this for the literal string "true"; any other value
          # keeps --skip-jenkins enabled, which skips the Finder .DS_Store layout.
          TAURI_BUNDLER_DMG_IGNORE_CI: "true"
        run: |
          set -euo pipefail

          unset TAURI_CONFIG
          unset TAURI_DEV_HOST

          rm -rf target/aarch64-apple-darwin/release/bundle
          rm -rf target/x86_64-apple-darwin/release/bundle

          if [ "$MACOS_NOTARIZE" = "true" ]; then
            for name in APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
              if [ -z "${!name:-}" ]; then
                echo "Missing required macOS notarization value: $name" >&2
                exit 1
              fi
            done
            cargo tauri build --target aarch64-apple-darwin --bundles dmg
            cargo tauri build --target x86_64-apple-darwin --bundles dmg
          else
            echo "Building ad-hoc signed release-profile macOS DMGs. Gatekeeper will warn until Developer ID notarization is enabled."
            unset APPLE_SIGNING_IDENTITY
            unset APPLE_ID
            unset APPLE_PASSWORD
            unset APPLE_TEAM_ID
            unset APPLE_API_KEY
            unset APPLE_API_ISSUER
            unset APPLE_API_KEY_PATH
            ad_hoc_signing_config='{"bundle":{"macOS":{"signingIdentity":"-","entitlements":"Entitlements.plist"}}}'
            cargo tauri build --target aarch64-apple-darwin --bundles dmg --config "$ad_hoc_signing_config"
            cargo tauri build --target x86_64-apple-darwin --bundles dmg --config "$ad_hoc_signing_config"
          fi

      - name: Stage macOS release artifacts
        shell: bash
        working-directory: Ratspeak
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          release_version="${RELEASE_VERSION:?Missing release version.}"
          case "$release_version" in
            */*|*\\*)
              echo "Release version must not contain path separators: $release_version" >&2
              exit 1
              ;;
          esac

          out_dir="dist/macos"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"

          stage_dmg() {
            local target="$1"
            local name="$2"
            local expected_arch="$3"
            local dmg_candidates=()
            local dmg
            while IFS= read -r -d '' candidate; do
              dmg_candidates+=("$candidate")
            done < <(find "src-tauri/target/$target/release/bundle/dmg" -maxdepth 1 -name '*.dmg' -type f -print0)
            if [ "${#dmg_candidates[@]}" -ne 1 ]; then
              echo "Expected exactly one DMG for $target, found ${#dmg_candidates[@]}" >&2
              printf '%s\n' "${dmg_candidates[@]}" >&2
              exit 1
            fi
            dmg="${dmg_candidates[0]}"
            cp "$dmg" "$out_dir/$name"
            hdiutil verify "$out_dir/$name"
            bash scripts/release/verify-macos-dmg.sh "$out_dir/$name" "$expected_arch"
          }

          stage_dmg aarch64-apple-darwin "Ratspeak-${release_version}-macos-arm64.dmg" arm64
          stage_dmg x86_64-apple-darwin "Ratspeak-${release_version}-macos-x64.dmg" x86_64

      - name: Check for bundled dev URLs
        shell: bash
        working-directory: Ratspeak
        run: bash scripts/release/assert-no-tauri-dev-url.sh dist/macos

      - name: Validate manual release tag
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_github_release && inputs.release_tag == '' }}
        shell: bash
        run: |
          echo "release_tag is required when publishing a GitHub Release from workflow_dispatch."
          exit 1

      - name: Write macOS checksums
        shell: bash
        working-directory: Ratspeak
        run: |
          set -euo pipefail
          checksum_file="checksums-macos.txt"
          : > "$checksum_file"
          find dist/macos -type f -print0 |
            sort -z |
            while IFS= read -r -d '' artifact; do
              shasum -a 256 "$artifact" >> "$checksum_file"
            done
          test -s "$checksum_file"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ratspeak-macos
          path: |
            Ratspeak/dist/macos/*
            Ratspeak/checksums-macos.txt
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_github_release) }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          prerelease: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name, '-') }}
          body: |
            - Fix direct delivery for peers over Bluetooth
            - General fixes and improvements
          files: |
            Ratspeak/dist/macos/*
            Ratspeak/checksums-macos.txt
