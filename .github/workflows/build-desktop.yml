name: Build Desktop (Linux + Windows)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Cargo profile"
        required: false
        default: "release"
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: ratspeak-linux-amd64
            build_command: cargo tauri build --bundles deb appimage rpm
            artifact_path: |
              Ratspeak/src-tauri/target/release/bundle/deb/*.deb
              Ratspeak/src-tauri/target/release/bundle/appimage/*.AppImage
              Ratspeak/src-tauri/target/release/bundle/rpm/*.rpm
          - os: ubuntu-22.04-arm
            artifact_name: ratspeak-linux-arm64
            build_command: cargo tauri build --bundles deb
            artifact_path: |
              Ratspeak/src-tauri/target/release/bundle/deb/*.deb
          - os: windows-latest
            artifact_name: ratspeak-windows
            build_command: cargo tauri build
            artifact_path: |
              Ratspeak/src-tauri/target/release/bundle/msi/*.msi
              Ratspeak/src-tauri/target/release/bundle/nsis/*.exe
    steps:
      # Check out repos into $GITHUB_WORKSPACE as siblings so Cargo
      # `../rsReticulum` path deps resolve correctly.
      - name: Checkout Ratspeak
        uses: actions/checkout@v4
        with:
          path: Ratspeak

      - name: Checkout rsReticulum sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/rsReticulum
          path: rsReticulum

      - name: Checkout rsLXMF sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/rsLXMF
          path: rsLXMF

      - name: Checkout lrgp-rs sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/lrgp-rs
          path: lrgp-rs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          workspaces: |
            Ratspeak
            Ratspeak/src-tauri

      - name: Install Linux system deps
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libudev-dev \
            pkg-config \
            patchelf \
            libfuse2 \
            rpm \
            file

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build CSS
        shell: bash
        working-directory: Ratspeak
        run: bash dashboard/build-css.sh

      - name: Build Tauri desktop app
        working-directory: Ratspeak/src-tauri
        run: ${{ matrix.build_command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: warn
          retention-days: 14
