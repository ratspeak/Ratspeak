name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: Ratspeak
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/rsReticulum
          path: rsReticulum
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/rsLXMF
          path: rsLXMF
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/rsLXST
          path: rsLXST
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/lrgp-rs
          path: lrgp-rs
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          workspaces: Ratspeak
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libudev-dev \
            libasound2-dev \
            libdbus-1-dev \
            pkg-config
      - run: cargo test --workspace
        working-directory: Ratspeak
      - name: Check Tauri desktop shell
        run: cargo check --manifest-path src-tauri/Cargo.toml
        working-directory: Ratspeak

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: Ratspeak
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/rsReticulum
          path: rsReticulum
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/rsLXMF
          path: rsLXMF
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/rsLXST
          path: rsLXST
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/lrgp-rs
          path: lrgp-rs
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          workspaces: Ratspeak
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libudev-dev \
            libasound2-dev \
            libdbus-1-dev \
            pkg-config
      - run: cargo fmt --all -- --check
        working-directory: Ratspeak
      - run: cargo clippy --workspace -- -D warnings
        working-directory: Ratspeak
