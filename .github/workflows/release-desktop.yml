name: Release Linux

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_github_release:
        description: "Publish Linux artifacts to a GitHub Release"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Release tag to publish when manually dispatching."
        required: false
        type: string

permissions:
  contents: write

env:
  RATSPEAK_RSRETICULUM_REF: 73b250f36ee95a27cbddaa6b39c246091fdf7e2b
  RATSPEAK_RSLXMF_REF: 30a62b29906281344a2a1a5d6fd4c99de7f29f83
  RATSPEAK_RSLXST_REF: 7ac244cafde428945838dd709794468d4654fc89

jobs:
  build:
    name: Linux ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
            bundles: deb appimage rpm
            artifact_name: ratspeak-linux-amd64
            deb_name: linux-amd64.deb
            deb_arch: amd64
            appimage_name: linux-x86_64.AppImage
            rpm_name: linux-x86_64.rpm
          - arch: arm64
            runner: ubuntu-22.04-arm
            bundles: deb
            artifact_name: ratspeak-linux-arm64
            deb_name: linux-arm64.deb
            deb_arch: arm64
            appimage_name: ""
            rpm_name: ""
    steps:
      - name: Checkout Ratspeak
        uses: actions/checkout@v5
        with:
          path: Ratspeak

      - name: Checkout rsReticulum
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/rsReticulum
          ref: ${{ env.RATSPEAK_RSRETICULUM_REF }}
          path: rsReticulum

      - name: Checkout rsLXMF
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/rsLXMF
          ref: ${{ env.RATSPEAK_RSLXMF_REF }}
          path: rsLXMF

      - name: Checkout rsLXST
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/rsLXST
          ref: ${{ env.RATSPEAK_RSLXST_REF }}
          path: rsLXST

      - name: Checkout lrgp-rs
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/lrgp-rs
          path: lrgp-rs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          workspaces: |
            Ratspeak
            Ratspeak/src-tauri

      - name: Install Linux system deps
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libudev-dev \
            libasound2-dev \
            libdbus-1-dev \
            pkg-config \
            patchelf \
            libfuse2 \
            rpm \
            file

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Run tests
        working-directory: Ratspeak
        run: cargo test --workspace

      - name: Build CSS
        shell: bash
        working-directory: Ratspeak
        run: bash dashboard/build-css.sh

      - name: Check Tauri desktop shell
        shell: bash
        working-directory: Ratspeak
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri desktop app
        shell: bash
        working-directory: Ratspeak/src-tauri
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          unset TAURI_CONFIG
          unset TAURI_DEV_HOST
          cargo tauri build --bundles ${{ matrix.bundles }}

      - name: Check for bundled dev URLs
        shell: bash
        working-directory: Ratspeak
        run: bash scripts/release/assert-no-tauri-dev-url.sh src-tauri/target/release/bundle

      - name: Stage Linux release artifacts
        shell: bash
        working-directory: Ratspeak
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          DEB_NAME: ${{ matrix.deb_name }}
          DEB_ARCH: ${{ matrix.deb_arch }}
          APPIMAGE_NAME: ${{ matrix.appimage_name }}
          RPM_NAME: ${{ matrix.rpm_name }}
        run: |
          set -euo pipefail
          release_version="${RELEASE_VERSION:?Missing release version.}"
          case "$release_version" in
            */*|*\\*)
              echo "Release version must not contain path separators: $release_version" >&2
              exit 1
              ;;
          esac

          out_dir="dist/linux"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"

          mapfile -t debs < <(find src-tauri/target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' | sort)
          deb="${debs[0]:-}"
          test -n "$deb"

          deb_artifact="Ratspeak-${release_version}-${DEB_NAME}"
          cp "$deb" "$out_dir/$deb_artifact"
          dpkg-deb --info "$out_dir/$deb_artifact" >/dev/null
          actual_arch="$(dpkg-deb --field "$out_dir/$deb_artifact" Architecture)"
          if [ "$actual_arch" != "$DEB_ARCH" ]; then
            echo "Expected $deb_artifact architecture $DEB_ARCH, got $actual_arch"
            exit 1
          fi

          if [ -n "$APPIMAGE_NAME" ]; then
            mapfile -t appimages < <(find src-tauri/target/release/bundle/appimage -maxdepth 1 -type f -name '*.AppImage' | sort)
            appimage="${appimages[0]:-}"
            test -n "$appimage"
            appimage_artifact="Ratspeak-${release_version}-${APPIMAGE_NAME}"
            cp "$appimage" "$out_dir/$appimage_artifact"
            chmod +x "$out_dir/$appimage_artifact"
            file "$out_dir/$appimage_artifact"
          fi

          if [ -n "$RPM_NAME" ]; then
            mapfile -t rpms < <(find src-tauri/target/release/bundle/rpm -maxdepth 1 -type f -name '*.rpm' | sort || true)
            rpm="${rpms[0]:-}"
            if [ -n "$rpm" ]; then
              rpm_artifact="Ratspeak-${release_version}-${RPM_NAME}"
              cp "$rpm" "$out_dir/$rpm_artifact"
            fi
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            Ratspeak/dist/linux/*
          if-no-files-found: error
          retention-days: 30

  package:
    name: Linux package
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: ratspeak-linux-*
          path: Ratspeak/dist/linux
          merge-multiple: true

      - name: Validate manual release tag
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_github_release && inputs.release_tag == '' }}
        shell: bash
        run: |
          echo "release_tag is required when publishing a GitHub Release from workflow_dispatch."
          exit 1

      - name: Validate Linux release artifacts
        shell: bash
        env:
          RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          release_version="${RELEASE_VERSION:?Missing release version.}"
          case "$release_version" in
            */*|*\\*)
              echo "Release version must not contain path separators: $release_version" >&2
              exit 1
              ;;
          esac

          amd64_deb="Ratspeak/dist/linux/Ratspeak-${release_version}-linux-amd64.deb"
          arm64_deb="Ratspeak/dist/linux/Ratspeak-${release_version}-linux-arm64.deb"
          test -f "$amd64_deb"
          test -f "$arm64_deb"
          amd64_arch="$(dpkg-deb --field "$amd64_deb" Architecture)"
          arm64_arch="$(dpkg-deb --field "$arm64_deb" Architecture)"
          test "$amd64_arch" = "amd64"
          test "$arm64_arch" = "arm64"
          find Ratspeak/dist/linux -maxdepth 1 -type f -print | sort

      - name: Write Linux checksums
        shell: bash
        working-directory: Ratspeak
        run: |
          set -euo pipefail
          checksum_file="checksums-linux.txt"
          : > "$checksum_file"
          find dist/linux -type f -print0 |
            sort -z |
            while IFS= read -r -d '' artifact; do
              sha256sum "$artifact" >> "$checksum_file"
            done
          test -s "$checksum_file"

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ratspeak-linux
          path: |
            Ratspeak/dist/linux/*
            Ratspeak/checksums-linux.txt
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_github_release) }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          prerelease: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name, '-') }}
          body: |
            - Fix direct delivery for peers over Bluetooth
            - General fixes and improvements
          files: |
            Ratspeak/dist/linux/*
            Ratspeak/checksums-linux.txt
