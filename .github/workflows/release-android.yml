name: Release Android

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_github_release:
        description: "Publish APK artifacts to a GitHub Release"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Release tag to publish when manually dispatching."
        required: false
        type: string
      upload_play:
        description: "Upload the signed AAB to Google Play."
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Android
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Ratspeak
        uses: actions/checkout@v4
        with:
          path: Ratspeak

      - name: Checkout rsReticulum
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/rsReticulum
          ref: v0.9.2
          path: rsReticulum

      - name: Checkout rsLXMF
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/rsLXMF
          ref: v0.9.0
          path: rsLXMF

      - name: Checkout lrgp-rs
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/lrgp-rs
          path: lrgp-rs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: bash
        run: |
          set +e +o pipefail
          yes | sdkmanager "ndk;27.0.12077973"
          sdkmanager_status=${PIPESTATUS[1]}
          set -e -o pipefail
          if [ "$sdkmanager_status" -ne 0 ]; then
            exit "$sdkmanager_status"
          fi
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.0.12077973" >> "$GITHUB_ENV"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            Ratspeak
            Ratspeak/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build CSS
        shell: bash
        working-directory: Ratspeak
        run: bash dashboard/build-css.sh

      - name: Configure Android signing
        shell: bash
        working-directory: Ratspeak
        env:
          ANDROID_SIGNING_REQUIRED: "1"
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
          ANDROID_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}
        run: bash scripts/release/setup-android-signing.sh

      - name: Build signed Android APKs
        shell: bash
        working-directory: Ratspeak/src-tauri
        run: |
          unset TAURI_CONFIG
          unset TAURI_DEV_HOST
          cargo tauri android build --target aarch64 armv7 i686 x86_64 --apk --split-per-abi

      - name: Build signed Android AAB
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_play }}
        shell: bash
        working-directory: Ratspeak/src-tauri
        run: |
          unset TAURI_CONFIG
          unset TAURI_DEV_HOST
          cargo tauri android build --target aarch64 armv7 i686 x86_64 --aab

      - name: Check for bundled dev URLs
        shell: bash
        working-directory: Ratspeak
        run: bash scripts/release/assert-no-tauri-dev-url.sh src-tauri/gen/android/app/build/outputs

      - name: Validate manual release tag
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_github_release && inputs.release_tag == '' }}
        shell: bash
        run: |
          echo "release_tag is required when publishing a GitHub Release from workflow_dispatch."
          exit 1

      - name: Stage Android release APKs
        shell: bash
        working-directory: Ratspeak
        run: |
          out_dir="dist/android"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"
          cp src-tauri/gen/android/app/build/outputs/apk/arm64/release/app-arm64-release.apk "$out_dir/Ratspeak-arm64.apk"
          cp src-tauri/gen/android/app/build/outputs/apk/arm/release/app-arm-release.apk "$out_dir/Ratspeak-armv7.apk"
          cp src-tauri/gen/android/app/build/outputs/apk/x86/release/app-x86-release.apk "$out_dir/Ratspeak-x86.apk"
          cp src-tauri/gen/android/app/build/outputs/apk/x86_64/release/app-x86_64-release.apk "$out_dir/Ratspeak-x86_64.apk"

      - name: Write APK checksums
        shell: bash
        working-directory: Ratspeak
        run: |
          checksum_file="checksums-android.txt"
          : > "$checksum_file"
          find dist/android -type f -name '*.apk' -print0 |
            sort -z |
            while IFS= read -r -d '' artifact; do
              sha256sum "$artifact" >> "$checksum_file"
            done
          test -s "$checksum_file"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ratspeak-android
          path: |
            Ratspeak/src-tauri/gen/android/app/build/outputs/**/*.aab
            Ratspeak/dist/android/*.apk
            Ratspeak/checksums-android.txt
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_github_release) }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          files: |
            Ratspeak/dist/android/*.apk
            Ratspeak/checksums-android.txt

      - name: Upload to Google Play
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_play }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ vars.GOOGLE_PLAY_PACKAGE_NAME || 'org.ratspeak.android' }}
          releaseFiles: Ratspeak/src-tauri/gen/android/app/build/outputs/**/*.aab
          track: ${{ vars.GOOGLE_PLAY_TRACK || 'internal' }}
          status: draft
