name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_github_release:
        description: "Publish Windows artifacts to a GitHub Release"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Release tag to publish when manually dispatching."
        required: false
        type: string

permissions:
  contents: write

env:
  RATSPEAK_RSRETICULUM_REF: 491664d24c7497c41d475abcf4324273c34e0ce6
  RATSPEAK_RSLXMF_REF: 1fc8e68b295632c8b5322c57566ba635e28ce6f0
  RATSPEAK_RSLXST_REF: 8f452ad1e75c4a4db1266a829ea484ed0c651908

jobs:
  build:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: Checkout Ratspeak
        uses: actions/checkout@v4
        with:
          path: Ratspeak

      - name: Checkout rsReticulum
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/rsReticulum
          ref: ${{ env.RATSPEAK_RSRETICULUM_REF }}
          path: rsReticulum

      - name: Checkout rsLXMF
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/rsLXMF
          ref: ${{ env.RATSPEAK_RSLXMF_REF }}
          path: rsLXMF

      - name: Checkout rsLXST
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/rsLXST
          ref: ${{ env.RATSPEAK_RSLXST_REF }}
          path: rsLXST

      - name: Checkout lrgp-rs
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/lrgp-rs
          path: lrgp-rs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          workspaces: |
            Ratspeak
            Ratspeak/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Run tests
        working-directory: Ratspeak
        run: cargo test --workspace

      - name: Build CSS
        shell: bash
        working-directory: Ratspeak
        run: bash dashboard/build-css.sh

      - name: Check Tauri desktop shell
        shell: bash
        working-directory: Ratspeak
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build Tauri Windows installers
        shell: bash
        working-directory: Ratspeak/src-tauri
        run: |
          unset TAURI_CONFIG
          unset TAURI_DEV_HOST
          cargo tauri build --bundles msi nsis

      - name: Check for bundled dev URLs
        shell: bash
        working-directory: Ratspeak
        run: bash scripts/release/assert-no-tauri-dev-url.sh src-tauri/target/release/bundle

      - name: Validate manual release tag
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_github_release && inputs.release_tag == '' }}
        shell: pwsh
        run: |
          throw "release_tag is required when publishing a GitHub Release from workflow_dispatch."

      - name: Stage Windows release artifacts
        shell: pwsh
        working-directory: Ratspeak
        run: |
          $ErrorActionPreference = "Stop"
          $outDir = "dist/windows"
          Remove-Item -Recurse -Force $outDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $outDir | Out-Null

          $msi = Get-ChildItem "src-tauri/target/release/bundle/msi" -Filter "*.msi" -File |
            Sort-Object FullName |
            Select-Object -First 1
          $setup = Get-ChildItem "src-tauri/target/release/bundle/nsis" -Filter "*.exe" -File |
            Sort-Object FullName |
            Select-Object -First 1

          if (-not $msi) {
            throw "Missing Windows MSI artifact."
          }
          if (-not $setup) {
            throw "Missing Windows NSIS setup executable."
          }

          Copy-Item $msi.FullName "$outDir/Ratspeak-x64.msi"
          Copy-Item $setup.FullName "$outDir/Ratspeak-x64-setup.exe"

          Get-Item "$outDir/Ratspeak-x64.msi", "$outDir/Ratspeak-x64-setup.exe" |
            Format-Table Name, Length

      - name: Write Windows checksums
        shell: pwsh
        working-directory: Ratspeak
        run: |
          $ErrorActionPreference = "Stop"
          $checksumFile = "checksums-windows.txt"
          $lines = Get-ChildItem "dist/windows" -File |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
              $path = $_.FullName.Replace((Get-Location).Path + [System.IO.Path]::DirectorySeparatorChar, "").Replace("\", "/")
              "$hash  $path"
            }

          if (-not $lines) {
            throw "No Windows artifacts found for checksums."
          }

          $lines | Set-Content -Encoding ascii $checksumFile

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ratspeak-windows
          path: |
            Ratspeak/dist/windows/*
            Ratspeak/checksums-windows.txt
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish_github_release) }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          prerelease: ${{ contains(github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name, '-') }}
          files: |
            Ratspeak/dist/windows/*
            Ratspeak/checksums-windows.txt
