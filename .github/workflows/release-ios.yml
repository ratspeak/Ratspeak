name: Release iOS

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: "Build mode"
        required: true
        default: simulator-smoke
        type: choice
        options:
          - simulator-smoke
          - testflight

permissions:
  contents: read

env:
  RATSPEAK_RSRETICULUM_REF: ade40c8283266cea282920dcc53b33158aec8fbe
  RATSPEAK_RSLXMF_REF: a47ddac7c692123c536956107d9f94b0e7c57ff3
  RATSPEAK_RSLXST_REF: a64a7d0d504af5f172044efc05af007bd7e4c936

jobs:
  build:
    name: iOS
    runs-on: macos-latest
    steps:
      - name: Checkout Ratspeak
        uses: actions/checkout@v5
        with:
          path: Ratspeak

      - name: Checkout rsReticulum
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/rsReticulum
          ref: ${{ env.RATSPEAK_RSRETICULUM_REF }}
          path: rsReticulum

      - name: Checkout rsLXMF
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/rsLXMF
          ref: ${{ env.RATSPEAK_RSLXMF_REF }}
          path: rsLXMF

      - name: Checkout rsLXST
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/rsLXST
          ref: ${{ env.RATSPEAK_RSLXST_REF }}
          path: rsLXST

      - name: Checkout lrgp-rs
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/lrgp-rs
          path: lrgp-rs

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false
          workspaces: |
            Ratspeak
            Ratspeak/src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build CSS
        shell: bash
        working-directory: Ratspeak
        run: bash dashboard/build-css.sh

      - name: Import iOS signing credentials
        if: ${{ inputs.build_mode == 'testflight' }}
        shell: bash
        env:
          IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          for name in IOS_DISTRIBUTION_CERTIFICATE_BASE64 IOS_DISTRIBUTION_CERTIFICATE_PASSWORD IOS_PROVISIONING_PROFILE_BASE64; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required iOS signing secret: $name" >&2
              exit 1
            fi
          done

          CERTIFICATE_PATH="$RUNNER_TEMP/ios_distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/ratspeak.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/ratspeak.mobileprovision"

      - name: Use App Store export method
        if: ${{ inputs.build_mode == 'testflight' }}
        working-directory: Ratspeak/src-tauri/gen/apple
        run: /usr/libexec/PlistBuddy -c "Set :method app-store-connect" ExportOptions.plist

      - name: Build iOS simulator smoke app
        if: ${{ inputs.build_mode == 'simulator-smoke' }}
        shell: bash
        working-directory: Ratspeak/src-tauri
        run: |
          unset TAURI_CONFIG
          unset TAURI_DEV_HOST
          cargo tauri ios build --debug --target aarch64-sim

      - name: Build TestFlight IPA
        if: ${{ inputs.build_mode == 'testflight' }}
        shell: bash
        working-directory: Ratspeak/src-tauri
        run: |
          unset TAURI_CONFIG
          unset TAURI_DEV_HOST
          cargo tauri ios build --target aarch64

      - name: Check for bundled dev URLs
        shell: bash
        working-directory: Ratspeak
        run: bash scripts/release/assert-no-tauri-dev-url.sh src-tauri/gen/apple/build

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ratspeak-ios
          path: |
            Ratspeak/src-tauri/gen/apple/build/**/*.ipa
            Ratspeak/src-tauri/gen/apple/build/**/*.app
          if-no-files-found: error
          retention-days: 30

      - name: Upload to TestFlight
        if: ${{ inputs.build_mode == 'testflight' }}
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: Ratspeak/src-tauri/gen/apple/build/arm64/Ratspeak.ipa
          issuer-id: ${{ vars.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ vars.APPSTORE_API_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
